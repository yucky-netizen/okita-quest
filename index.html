<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(180deg, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
}

.screen {
  display: none;
  padding: 30px 20px;
}

.active {
  display: block;
}

h1 {
  font-size: 28px;
  margin-bottom: 20px;
}

.box {
  margin: 20px auto;
  padding: 20px;
  width: 90%;
  max-width: 350px;
  border-radius: 15px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

button {
  width: 90%;
  max-width: 300px;
  padding: 18px;
  font-size: 18px;
  margin-top: 20px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
}

button:active {
  transform: scale(0.95);
}

.start {
  background: linear-gradient(45deg, gold, orange);
  color: black;
  font-weight: bold;
}

.phase1 {
  background: linear-gradient(45deg, #00ff88, #00cc66);
}

.phase2 {
  background: linear-gradient(45deg, #ffe600, #ffcc00);
  color: black;
}

.phase3 {
  background: linear-gradient(45deg, #ff4d4d, #cc0000);
}

input {
  padding: 15px;
  width: 85%;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  margin-top: 20px;
}

.fade {
  animation: fade 0.4s;
}

@keyframes fade {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>

</head>
<body>

<!-- 🏠 ホーム -->
<div id="home" class="screen active">
  <h1>🎮 オキタラクエスト</h1>

  <div class="box">
    🔥 覚醒ゲージ：<span id="gauge">0</span>%<br><br>
    📈 成長ポイント：<span id="points">0</span>pt<br><br>

    💭 未来ログ：
    <div id="message">「まだ間に合う」</div>
  </div>

  <button class="start" onclick="start()">▶ 今すぐ始める</button>
</div>

<!-- 🟢 フェーズ1 -->
<div id="phase1" class="screen">
  <h1>🟢 起動</h1>
  <p>「1分でいい。とりあえず動け」</p>
  
  <div id="timer">10</div>
  <div id="status"></div>
  
  <div class="box" id="task1"></div>

  <button class="phase1" onclick="next(2)">実行する</button>
</div>
  

<!-- 🟡 フェーズ2 -->
<div id="phase2" class="screen">
  <h1>🟡 加速</h1>
  <p>「ここで差がつく」</p>

  <div class="box" id="task2"></div>

  <button class="phase2" onclick="next(3)">実行する</button>
</div>

<!-- 🔴 フェーズ3 -->
<div id="phase3" class="screen">
  <h1>🔴 選択</h1>
  <p>「これをやれば今日は勝ち」</p>

  <input id="customTask" placeholder="やることを書く">

  <br>
  <button class="phase3" onclick="complete()">開始する</button>
</div>

<!-- 🎉 完了 -->
<div id="complete" class="screen">
  <h1>🎉 クエスト達成！</h1>

  <div class="box">
    +<span id="gain">0</span>pt 獲得！<br><br>
    🔥 覚醒：<span id="newGauge"></span>%<br><br>
    「さっきの自分より前進してる」
  </div>

  <button onclick="reset()">▶ 次のクエスト</button>
</div>

<script>
let points = 0;
let gauge = 0;

const tasks1 = [
  "水を飲む",
  "立ち上がる",
  "肩を回す",
  "窓を開ける",
  "深呼吸する"
];

const tasks2 = [
  "皿を洗う",
  "洗濯を回す",
  "机を整える",
  "ゴミをまとめる",
  "3分だけ掃除"
];

const messages = [
  "まだ間に合う",
  "今動けば変わる",
  "未来の自分が待ってる",
  "ここでやるか、終わるか",
  "昨日と同じでいいのか？"
];

function show(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  const el = document.getElementById(id);
  el.classList.add("active");
  el.classList.add("fade");
}

function start() {
  startCountdown();
}

function next(phase) {
  if (phase === 2) {
    document.getElementById("task2").innerText =
      tasks2[Math.floor(Math.random() * tasks2.length)];
    show("phase2");
  } else if (phase === 3) {
    show("phase3");
  }
}

function complete() {
  let gain = Math.floor(Math.random() * 20) + 30;
  points += gain;
  gauge += Math.floor(Math.random() * 10) + 5;

  document.getElementById("gain").innerText = gain;
  document.getElementById("newGauge").innerText = gauge;

  alert("覚醒レベル上昇 + " + gain + "pt");

  show("complete");
}

function reset() {
  document.getElementById("points").innerText = points;
  document.getElementById("gauge").innerText = gauge;
  document.getElementById("message").innerText =
    messages[Math.floor(Math.random() * messages.length)];

  document.getElementById("customTask").value = "";

  show("home");
}

/* 🔥 ここからタイマー */
let countdown = 10;
let timerInterval;

function startCountdown() {
  countdown = 10;
  document.getElementById("status").innerText = "準備しろ...";
  document.getElementById("timer").innerText = countdown;

  timerInterval = setInterval(() => {
    countdown--;
    document.getElementById("timer").innerText = countdown;

    if (countdown <= 0) {
      clearInterval(timerInterval);
      startTask();
    }
  }, 1000);
}

function startTask() {
  document.getElementById("status").innerText = "🔥 今すぐやれ 🔥";
  document.body.style.background = "#1a0000";

  let count = localStorage.getItem("count") || 0;
  count++;
  localStorage.setItem("count", count);

  document.getElementById("status").innerText += "（今日 " + count + "回目）";

  // 👇 ここ追加
  document.getElementById("task1").innerText =
    tasks1[Math.floor(Math.random() * tasks1.length)];

  show("phase1");
}
/* PWA */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
