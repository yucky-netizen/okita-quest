<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>オキタラクエスト</title>

  
<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#0f2027,#203a43,#2c5364);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.screen{
  display:none;
  width:100%;
  max-width:420px;
  padding:20px;
  text-align:center;
}
.active{display:block;}

.box{
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
  margin:15px 0;
}

button{
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
}

.start{background:gold;color:black;}
.phase1{background:#00cc66;}
.phase2{background:#ffcc00;color:black;}
.phase3{background:#cc0000;}

#timer{font-size:50px;}

.bar{
  height:10px;
  background:#333;
  border-radius:5px;
  overflow:hidden;
}
.fill{
  height:100%;
  background:gold;
  width:0%;
}
</style>
</head>

<body>

<!-- ホーム -->
<div id="home" class="screen active">
<h1>🎮 オキタラクエスト</h1>

<div class="box">
Lv.<span id="level">1</span><br>
XPバー
<div class="bar"><div id="xp" class="fill"></div></div>

🔥<span id="streak"></span>日継続<br>
📊<span id="total"></span>回達成
</div>

<button class="start" onclick="start()">▶ 始める</button>
<button onclick="showLog()">📜 今日の記録</button>
</div>

<!-- フェーズ1 -->
<div id="phase1" class="screen">
<h2>起動</h2>
<div id="timer">10</div>
<div id="status"></div>
<div class="box" id="task1"></div>
<button class="phase1" onclick="next(2)">実行</button>
</div>

<!-- フェーズ2 -->
<div id="phase2" class="screen">
<h2>加速</h2>
<div class="box" id="task2"></div>
<button class="phase2" onclick="next(3)">実行</button>
</div>

<!-- フェーズ3 -->
<div id="phase3" class="screen">
<h2>自由タスク</h2>

<input id="customTask" placeholder="やること">
<button onclick="saveCustom()">保存</button>

<div id="savedTasks"></div>

<button class="phase3" onclick="complete()">開始</button>
</div>

<!-- 完了 -->
<div id="complete" class="screen">
<h2 id="msg">達成！</h2>
<button onclick="reset()">戻る</button>
</div>

<!-- ログ -->
<div id="log" class="screen">
<h2>今日の記録</h2>
<div id="todayLog"></div>
<button onclick="show('home')">戻る</button>
</div>

<script>
let level=+localStorage.getItem("level")||1;
let xp=+localStorage.getItem("xp")||0;

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* スタート */
function start(){
  show("phase1");
  countdown();
}

/* タイマー */
let t=10,i;
function countdown(){
  timer.innerText=t;
  i=setInterval(()=>{
    t--;
    timer.innerText=t;
    if(t<=0){
      clearInterval(i);
      task1.innerText=randomTask(["水飲む","立つ","深呼吸"]);
    }
  },1000);
}

/* フェーズ */
function next(p){
  if(p==2){
    task2.innerText=randomTask(["掃除","片付け","洗う"]);
    show("phase2");
  }else{
    show("phase3");
    loadCustom();
  }
}

/* 完了 */
function complete(){
  xp+=20;
  if(xp>=100){
    xp=0;
    level++;
    msg.innerText="レベルアップ！";
  }

  saveData();
  saveLog();

  show("complete");
}

/* 保存 */
function saveData(){
  localStorage.setItem("level",level);
  localStorage.setItem("xp",xp);
}

/* カスタムタスク */
function saveCustom(){
  let task=customTask.value;
  let list=JSON.parse(localStorage.getItem("tasks")||"[]");
  list.push(task);
  localStorage.setItem("tasks",JSON.stringify(list));
  loadCustom();
}

function loadCustom(){
  let list=JSON.parse(localStorage.getItem("tasks")||"[]");
  savedTasks.innerHTML=list.map(t=>`<div>${t}</div>`).join("");
}

/* ログ */
function saveLog(){
  let today=new Date().toDateString();
  let logs=JSON.parse(localStorage.getItem("logs")||"{}");

  if(!logs[today]) logs[today]=[];
  logs[today].push("達成");

  localStorage.setItem("logs",JSON.stringify(logs));

  localStorage.setItem("total",
    (+localStorage.getItem("total")||0)+1
  );
}

/* 表示 */
function showLog(){
  let today=new Date().toDateString();
  let logs=JSON.parse(localStorage.getItem("logs")||"{}");
  todayLog.innerHTML=(logs[today]||[]).join("<br>");
  show("log");
}

/* リセット */
function reset(){
  show("home");
  updateUI();
}

/* UI */
function updateUI(){
  levelEl.innerText=level;
  xpEl.style.width=xp+"%";
  total.innerText=localStorage.getItem("total")||0;
}

/* 初期 */
window.onload=updateUI;

/* util */
function randomTask(arr){
  return arr[Math.random()*arr.length|0];
}
</script>

</body>
</html>
