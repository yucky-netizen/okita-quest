<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>オキタラクエスト</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#0f2027,#203a43,#2c5364);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.screen{
  display:none;
  width:100%;
  max-width:420px;
  padding:20px;
  text-align:center;
}
.active{display:block;}

.box{
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
  margin:15px 0;
}

button{
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
}

.start{background:gold;color:black;}
.phase1{background:#00cc66;}
.phase2{background:#ffcc00;color:black;}
.phase3{background:#cc0000;}

#timer{font-size:50px;}

.bar{
  height:10px;
  background:#333;
  border-radius:5px;
  overflow:hidden;
}
.fill{
  height:100%;
  background:gold;
  width:0%;
}

/* フラッシュ演出 */
.flash{
  animation:flash 0.4s;
}
@keyframes flash{
  0%{background:white;}
  100%{background:none;}
}
</style>
</head>

<body>

<div id="home" class="screen active">
<h1>🎮 オキタラクエスト</h1>

<div class="box">
Lv.<span id="level">1</span><br>
<div class="bar"><div id="xp" class="fill"></div></div>

🔥<span id="streak">0</span>日継続<br>
📊<span id="total">0</span>回達成
</div>

<button class="start" onclick="start()">▶ 始める</button>
<button onclick="showLog()">📜 今日の記録</button>
</div>

<!-- フェーズ1 -->
<div id="phase1" class="screen">
<h2>起動</h2>
<div id="timer">10</div>
<div class="box" id="task1"></div>
<button class="phase1" onclick="runPhase(1)">実行</button>
</div>

<!-- フェーズ2 -->
<div id="phase2" class="screen">
<h2>加速</h2>
<div id="timer2">5</div>
<div class="box" id="task2"></div>
<button class="phase2" onclick="runPhase(2)">実行</button>
</div>

<!-- フェーズ3 -->
<div id="phase3" class="screen">
<h2>自由タスク</h2>

<input id="customTask" placeholder="やること">
<button onclick="saveCustom()">保存</button>

<div id="savedTasks"></div>

<div id="timer3">5</div>
<button class="phase3" onclick="runPhase(3)">開始</button>
</div>

<!-- 完了 -->
<div id="complete" class="screen">
<h2 id="msg">達成！</h2>
<button onclick="reset()">戻る</button>
</div>

<!-- ログ -->
<div id="log" class="screen">
<h2>今日の記録</h2>
<div id="todayLog"></div>
<button onclick="show('home')">戻る</button>
</div>

<script>
let level=+localStorage.getItem("level")||1;
let xp=+localStorage.getItem("xp")||0;

/* 画面切替 */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* スタート */
function start(){
  show("phase1");
  countdownStart();
}

/* 初期タイマー */
function countdownStart(){
  let t=10;
  timer.innerText=t;

  let i=setInterval(()=>{
    t--;
    timer.innerText=t;
    if(t<=0){
      clearInterval(i);
      task1.innerText=randomTask(["水飲む","立つ","深呼吸"]);
    }
  },1000);
}

/* フェーズ実行 */
function runPhase(p){
  let t=5;
  let timerEl = document.getElementById("timer"+(p===1?"":p));
  if(p===1) timerEl = timer;

  let i=setInterval(()=>{
    t--;
    timerEl.innerText=t;
    if(t<=0){
      clearInterval(i);
      nextPhase(p);
    }
  },1000);
}

/* 次へ */
function nextPhase(p){
  document.body.classList.add("flash");
  setTimeout(()=>document.body.classList.remove("flash"),300);

  if(p==1){
    task2.innerText=randomTask(["掃除","片付け","洗う"]);
    show("phase2");
  }
  else if(p==2){
    show("phase3");
    loadCustom();
  }
  else{
    complete();
  }
}

/* 完了 */
function complete(){
  xp+=20;
  if(xp>=100){
    xp=0;
    level++;
    msg.innerText="レベルアップ！";
  }

  saveData();
  saveLog();
  show("complete");
}

/* 保存 */
function saveData(){
  localStorage.setItem("level",level);
  localStorage.setItem("xp",xp);
}

/* カスタム */
function saveCustom(){
  let task=customTask.value;
  let list=JSON.parse(localStorage.getItem("tasks")||"[]");
  list.push(task);
  localStorage.setItem("tasks",JSON.stringify(list));
  loadCustom();
}

function loadCustom(){
  let list=JSON.parse(localStorage.getItem("tasks")||"[]");
  savedTasks.innerHTML=list.map(t=>`<div>${t}</div>`).join("");
}

/* ログ */
function saveLog(){
  let today=new Date().toDateString();
  let logs=JSON.parse(localStorage.getItem("logs")||"{}");

  if(!logs[today]) logs[today]=[];
  logs[today].push("達成");

  localStorage.setItem("logs",JSON.stringify(logs));

  localStorage.setItem("total",
    (+localStorage.getItem("total")||0)+1
  );
}

function showLog(){
  let today=new Date().toDateString();
  let logs=JSON.parse(localStorage.getItem("logs")||"{}");
  todayLog.innerHTML=(logs[today]||[]).join("<br>");
  show("log");
}

/* リセット */
function reset(){
  show("home");
  updateUI();
}

/* UI */
function updateUI(){
  document.getElementById("level").innerText=level;
  document.getElementById("xp").style.width=xp+"%";
  document.getElementById("total").innerText=localStorage.getItem("total")||0;
}

window.onload=updateUI;

/* util */
function randomTask(arr){
  return arr[Math.random()*arr.length|0];
}
</script>

</body>
</html>
