<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>オキタラクエスト</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#0f2027,#203a43,#2c5364);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.screen{display:none; max-width:420px; width:100%; padding:20px; text-align:center;}
.active{display:block;}

.box{background:rgba(255,255,255,0.1); padding:20px; border-radius:15px; margin:15px 0;}

button{width:100%; padding:15px; margin-top:10px; border:none; border-radius:10px;}

.start{background:gold;}
.phase1{background:#00cc66;}
.phase2{background:#ffcc00;}
.phase3{background:#cc0000;}

.timer{font-size:50px;}

.bar{height:10px; background:#333; border-radius:5px;}
.fill{height:100%; background:gold; width:0%;}

.flash{animation:flash 0.3s;}
@keyframes flash{0%{background:white;}100%{background:none;}}
</style>
</head>

<body>

<!-- ホーム -->
<div id="home" class="screen active">
<h1>🎮 オキタラクエスト</h1>

<div class="box">
Lv.<span id="level">1</span>
<div class="bar"><div id="xp" class="fill"></div></div>
📊<span id="total">0</span>回達成
</div>

<button class="start" onclick="start()">▶ 始める</button>
<button onclick="show('log')">📜 記録</button>
</div>

<!-- フェーズ -->
<div id="phase" class="screen">
<h2 id="phaseTitle"></h2>
<div class="timer" id="timer">5</div>
<div class="box" id="task"></div>
<button onclick="startTask()">実行</button>
</div>

<!-- 完了 -->
<div id="complete" class="screen">
<h2 id="msg">達成！</h2>
<button onclick="reset()">戻る</button>
</div>

<!-- ログ -->
<div id="log" class="screen">
<h2>記録</h2>
<div id="todayLog"></div>
<button onclick="show('home')">戻る</button>
</div>

<script>
let level=+localStorage.getItem("level")||1;
let xp=+localStorage.getItem("xp")||0;

let phase=1;
let interval=null;

/* 画面 */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* スタート */
function start(){
  phase=1;
  nextPhase();
}

/* フェーズ進行 */
function nextPhase(){
  clearInterval(interval);

  show("phase");

  let title=["起動","加速","自由"][phase-1];
  document.getElementById("phaseTitle").innerText=title;

  let tasks=[
    ["水飲む","立つ","深呼吸"],
    ["掃除","片付け","洗う"],
    JSON.parse(localStorage.getItem("tasks")||"[]")
  ];

  let taskList = tasks[phase-1];
  let taskText = taskList.length ? taskList[Math.floor(Math.random()*taskList.length)] : "自由にやる";

  document.getElementById("task").innerText=taskText;
  document.getElementById("timer").innerText=5;
}

/* 実行 */
function startTask(){
  let t=5;
  let timerEl=document.getElementById("timer");

  clearInterval(interval);

  interval=setInterval(()=>{
    t--;
    timerEl.innerText=t;

    if(t<=0){
      clearInterval(interval);
      completePhase();
    }
  },1000);
}

/* フェーズ完了 */
function completePhase(){
  document.body.classList.add("flash");
  setTimeout(()=>document.body.classList.remove("flash"),200);

  if(phase<3){
    phase++;
    nextPhase();
  }else{
    finish();
  }
}

/* 完全達成 */
function finish(){
  xp+=20;

  if(xp>=100){
    xp=0;
    level++;
    document.getElementById("msg").innerText="レベルアップ！";
  }

  localStorage.setItem("level",level);
  localStorage.setItem("xp",xp);
  localStorage.setItem("total",(+localStorage.getItem("total")||0)+1);

  show("complete");
}

/* 戻る */
function reset(){
  show("home");
  updateUI();
}

/* UI */
function updateUI(){
  document.getElementById("level").innerText=level;
  document.getElementById("xp").style.width=xp+"%";
  document.getElementById("total").innerText=localStorage.getItem("total")||0;
}

/* 初期 */
window.onload=updateUI;
</script>

</body>
</html>
